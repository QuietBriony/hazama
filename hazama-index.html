<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Hazama</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="hazama-style.css?v=2.35" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <meta name="theme-color" content="#070a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hazama" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <main id="app">
    <header class="hz-header">
      <h1 class="hz-title">Hazama</h1>
      <p class="hz-subtitle">扉を100%まで開き、Ωへ潜る短い深度ローグ。</p>
    </header>

    <figure class="hz-visual" aria-label="深度に応じた探索者または曼荼羅ゲート">
      <img class="hz-visual-depth" src="assets/hazama-descent-key.webp" width="1500" height="900" alt="" fetchpriority="high" decoding="async" />
      <span class="hz-gate-orb" aria-hidden="true">
        <img src="assets/hazama-goal-mandala.webp" width="960" height="960" alt="" decoding="async" />
      </span>
    </figure>

    <section id="story" class="hz-story">
      深度データを読み込み中…
    </section>

    <section id="options" class="hz-options"></section>
  </main>

  <footer class="hz-footer">
    <div class="hz-footer-row">
      <small id="runtime-status">ローカル hazama-depths.json を読込中</small>
      <div class="hz-footer-actions">
        <small id="app-version">v</small>
        <button id="pwa-install" class="hz-reset hz-pwa-install" type="button" hidden>アプリ化</button>
        <button id="reset-progress" class="hz-reset" type="button">リセット</button>
      </div>
    </div>
  </footer>

  <script src="hazama-seed.js?v=2.35"></script>
  <script src="hazama-state.js?v=2.35"></script>
  <script src="hazama-gate-run.js?v=2.35"></script>
  <script src="hazama-main.js?v=2.35"></script>
</body>
</html>
