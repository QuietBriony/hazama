<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Hazama 狭間</title>
  <meta name="description" content="沈むほど戻りにくい。認識が合う者だけがΩへ潜る、没入の降下対話。" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#04060b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hazama" />
  <!-- E4: リンク共有プレビュー（OG/Twitter）。og:image は絶対URL必須＝本番 Pages を指す。
       webp 非対応のパーサ向けに png（icon-512）を二枚目として併記（先頭が優先される）。 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Hazama 狭間" />
  <meta property="og:description" content="沈むほど戻りにくい。認識が合う者だけがΩへ潜る、没入の降下対話。" />
  <meta property="og:url" content="https://quietbriony.github.io/hazama/" />
  <meta property="og:image" content="https://quietbriony.github.io/hazama/assets/hazama-descent-key.webp" />
  <meta property="og:image" content="https://quietbriony.github.io/hazama/icons/icon-512.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="slice.css?v=e17" />
</head>
<body data-phase="surface">
  <div class="hz-bg" aria-hidden="true">
    <img class="hz-bg-descent" src="assets/hazama-descent-key.webp" alt="" decoding="async" fetchpriority="high" />
    <!-- 反転重森ガーデン（R6）：深く潜るほど"世界の輪郭が溶け"、サイバーパンク×重森三玲の
         枯山水（砂紋/石組/市松苔）が色相反転（自然色を180°反転＝不気味）して progressive に露出する。
         構図は分岐エンジンの信号（周回/到達深度/弾かれ履歴/ランク）= worldSeed で再生成。
         浅はクリーン（opacity 0）。state 変化時のみ再描画＝モバイル軽量。reduced は静止1枚。 -->
    <canvas class="hz-bg-garden" id="garden" aria-hidden="true"></canvas>
    <!-- 沈降グロー：底中央から立ち上る冷たい淵。沈むほど増光・上昇し、曼荼羅が光の底から現れる。 -->
    <div class="hz-bg-abyss"></div>
    <!-- 配線グリッド：沈むほど露出する縦の導線（「世界は塗装だった／編み目」の視覚化）。下方ほど密。 -->
    <div class="hz-bg-grid"></div>
    <div class="hz-bg-mandala"><canvas id="mandala" aria-hidden="true"></canvas></div>
    <!-- 原色 leak（R6）：ティファニーブルー／ラスタ（赤・金・緑）が隙間（あわい）から"ちらちら"漏れる。
         常時は出さず、グリッジのバーストに同調して一瞬だけ明滅＝抑えるほど効く。深いほど明るく漏れる。 -->
    <div class="hz-bg-leak" aria-hidden="true"></div>
    <!-- グリッジ：深度連動の走査線の裂け＋RGBずれ＋データモッシュ。「描画の乱れ」＝塗装が剥がれる。
         既定は不可視（visibility:hidden）。JS が深いほど高頻度・高強度の短いバーストで点灯。 -->
    <div class="hz-glitch" aria-hidden="true"></div>
    <div class="hz-vignette"></div>
    <div class="hz-scanline"></div>
    <div class="hz-grain"></div>
  </div>

  <!-- 塗装剥がれ／めくれ遷移：ノード遷移で一度だけ、ぎざついた縁の帯がめくれて降りる（reduced で無効）。 -->
  <div class="hz-peel" aria-hidden="true"></div>

  <main id="app" class="hz-app">
    <!-- 沈下インジケータ：数値は出さない。線が下へ伸び、戻り道が一本ずつ消え、観測者が増える。 -->
    <div class="hz-gauge" aria-hidden="true">
      <div class="hz-observer" id="observer-count" data-count="1">私</div>
      <div class="hz-gauge-track"><div id="sink-fill" class="hz-gauge-fill"></div></div>
      <div id="return-paths" class="hz-return-paths"></div>
      <div id="attune" class="hz-attune" hidden></div>
    </div>

    <section id="scene" class="hz-scene" aria-live="polite"></section>
    <section id="choices" class="hz-choices"></section>
  </main>

  <footer class="hz-footer">
    <button id="audio-toggle" class="hz-chip" type="button" hidden>♪ 鳴らす</button>
    <span id="status" class="hz-status"></span>
  </footer>

  <div id="gate" class="hz-gate">
    <div class="hz-gate-inner">
      <h1 class="hz-sr-only">Hazama 狭間</h1>
      <div class="hz-gate-title" data-text="Hazama">Hazama</div>

      <p class="hz-gate-sub">狭間（あわい）<br>沈むほど、戻り道は細くなる。</p>
      <button id="gate-enter" class="hz-gate-enter" type="button" disabled><span>沈む</span></button>
      <p class="hz-gate-note">音あり推奨・片手で読める縦長</p>
    </div>
  </div>

  <script src="slice.js?v=e17"></script>
</body>
</html>
