<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Hazama — 沈下スパイン (M2 preview)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#04060b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hazama" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="slice.css?v=r2" />
</head>
<body data-phase="surface">
  <div class="hz-bg" aria-hidden="true">
    <img class="hz-bg-descent" src="assets/hazama-descent-key.webp" alt="" decoding="async" fetchpriority="high" />
    <!-- 反転重森ガーデン（R6）：深く潜るほど"世界の輪郭が溶け"、サイバーパンク×重森三玲の
         枯山水（砂紋/石組/市松苔）が色相反転（自然色を180°反転＝不気味）して progressive に露出する。
         構図は分岐エンジンの信号（周回/到達深度/弾かれ履歴/ランク）= worldSeed で再生成。
         浅はクリーン（opacity 0）。state 変化時のみ再描画＝モバイル軽量。reduced は静止1枚。 -->
    <canvas class="hz-bg-garden" id="garden" aria-hidden="true"></canvas>
    <!-- 沈降グロー：底中央から立ち上る冷たい淵。沈むほど増光・上昇し、曼荼羅が光の底から現れる。 -->
    <div class="hz-bg-abyss"></div>
    <!-- 配線グリッド：沈むほど露出する縦の導線（「世界は塗装だった／編み目」の視覚化）。下方ほど密。 -->
    <div class="hz-bg-grid"></div>
    <div class="hz-bg-mandala"><canvas id="mandala" aria-hidden="true"></canvas></div>
    <!-- 原色 leak（R6）：ティファニーブルー／ラスタ（赤・金・緑）が隙間（あわい）から"ちらちら"漏れる。
         常時は出さず、グリッジのバーストに同調して一瞬だけ明滅＝抑えるほど効く。深いほど明るく漏れる。 -->
    <div class="hz-bg-leak" aria-hidden="true"></div>
    <!-- グリッジ：深度連動の走査線の裂け＋RGBずれ＋データモッシュ。「描画の乱れ」＝塗装が剥がれる。
         既定は不可視（visibility:hidden）。JS が深いほど高頻度・高強度の短いバーストで点灯。 -->
    <div class="hz-glitch" aria-hidden="true"></div>
    <div class="hz-vignette"></div>
    <div class="hz-scanline"></div>
    <div class="hz-grain"></div>
  </div>

  <!-- 塗装剥がれ／めくれ遷移：ノード遷移で一度だけ、ぎざついた縁の帯がめくれて降りる（reduced で無効）。 -->
  <div class="hz-peel" aria-hidden="true"></div>

  <main id="app" class="hz-app">
    <!-- 沈下インジケータ：数値は出さない。線が下へ伸び、戻り道が一本ずつ消え、観測者が増える。 -->
    <div class="hz-gauge" aria-hidden="true">
      <div class="hz-observer" id="observer-count" data-count="1">私</div>
      <div class="hz-gauge-track"><div id="sink-fill" class="hz-gauge-fill"></div></div>
      <div id="return-paths" class="hz-return-paths"></div>
    </div>

    <section id="scene" class="hz-scene" aria-live="polite"></section>
    <section id="choices" class="hz-choices"></section>
  </main>

  <footer class="hz-footer">
    <button id="audio-toggle" class="hz-chip" type="button" hidden>♪ 鳴らす</button>
    <button id="restart" class="hz-chip hz-chip-quiet" type="button" hidden>最初へ</button>
    <span id="status" class="hz-status">preview · M2 沈下スパイン</span>
  </footer>

  <div id="gate" class="hz-gate">
    <div class="hz-gate-inner">
      <h1 class="hz-sr-only">Hazama 狭間</h1>
      <!-- タイトル＝バスキア的な生マーク（手で書きつけた声）が冷たい構造を突き破る。
           R6: 王冠（安っぽいバスキア）は削除。代わりに枯山水の砂紋（掻き目）が冠さず沈下を示す。
           RGBずれ＝グリッジでありオイルスティックの刷り重ね。打ち消し線＝「描かれない核」を手が消し込む否定。
           表紙は静止でなく動く＝背後に反転ガーデンが薄く滲み、グリッジが時折タイトルを裂く（slice.js）。 -->
      <svg class="hz-gate-art" viewBox="0 0 440 300" role="img" aria-label="Hazama / 狭間" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="hz-rough" x="-20%" y="-30%" width="140%" height="160%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="hz-rough2" x="-30%" y="-40%" width="160%" height="180%">
            <feTurbulence type="fractalNoise" baseFrequency="0.03 0.05" numOctaves="2" seed="19" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="11" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>

        <!-- 下地：荒い塗りの矩形（オイルスティックの面）＋擦れ -->
        <g filter="url(#hz-rough2)" opacity="0.9">
          <rect x="36" y="86" width="368" height="120" fill="#10161f"/>
          <rect x="36" y="86" width="368" height="120" fill="none" stroke="#3a4450" stroke-width="2"/>
          <path d="M52 196 L120 188 L210 198 L300 186 L388 196" stroke="#c4513a" stroke-width="3.5" fill="none" opacity="0.5"/>
        </g>

        <!-- 砂紋（枯山水の掻き目）：王冠の代わり。冠さず、ただ下方へ向かう沈下＝渦の縁を示す。
             冷たい青緑＝反転ガーデンと同系。手描きの荒れ（rough）で生のまま。 -->
        <g filter="url(#hz-rough)" stroke="#7fb6c4" fill="none" stroke-linecap="round" opacity="0.55">
          <path d="M118 72 Q220 40 322 72" stroke-width="2.6"/>
          <path d="M148 80 Q220 56 292 80" stroke-width="2.1"/>
          <path d="M176 86 Q220 70 264 86" stroke-width="1.6"/>
        </g>

        <!-- HAZAMA：RGBずれ三層（cyan/red/bone）＝グリッジ＆刷り重ね。bone は荒れフィルタ。 -->
        <g class="hz-title-word" font-family="'Hiragino Sans','Yu Gothic',system-ui,sans-serif" font-weight="900" font-size="74" letter-spacing="2" text-anchor="middle">
          <text class="hz-tl-c" x="220" y="166" fill="#7fb6c4">HAZAMA</text>
          <text class="hz-tl-r" x="220" y="166" fill="#d8442e">HAZAMA</text>
          <text class="hz-tl-m" x="220" y="166" fill="#ece6d6" filter="url(#hz-rough)">HAZAMA</text>
        </g>

        <!-- 荒い手描きの下線 -->
        <path d="M70 188 C150 180 250 196 372 184" stroke="#ece6d6" stroke-width="3" fill="none" filter="url(#hz-rough)" opacity="0.8"/>

        <!-- 狭間：走り書き＋打ち消し線（核は描かれない＝手が消し込む否定） -->
        <g transform="rotate(-1.6 220 244)">
          <text x="220" y="256" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="42" letter-spacing="14" fill="#e8e2d4" filter="url(#hz-rough)">狭間</text>
          <path d="M150 244 C200 234 250 252 300 240" stroke="#d8442e" stroke-width="4" fill="none" filter="url(#hz-rough)" opacity="0.85"/>
        </g>

        <!-- 走り書きの余白マーク（オイルスティックの跳ね） -->
        <g stroke="#7fb6c4" stroke-width="2.5" fill="none" filter="url(#hz-rough)" opacity="0.55" stroke-linecap="round">
          <path d="M398 60 l16 -14 M404 54 l14 6"/>
          <path d="M30 256 l22 -8"/>
        </g>
      </svg>

      <p class="hz-gate-sub">狭間（あわい）。<br><span class="hz-strike">進むほど、戻り道は細くなる。</span></p>
      <button id="gate-enter" class="hz-gate-enter" type="button" disabled><span>沈む</span></button>
      <p class="hz-gate-note">音あり推奨・片手で読める縦長 / preview build (M2 · R6 反転ガーデン)</p>
    </div>
  </div>

  <script src="slice.js?v=r2"></script>
</body>
</html>
