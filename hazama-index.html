<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Hazama</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="hazama-style.css?v=2.40" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <meta name="theme-color" content="#070a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hazama" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <main id="app">
    <header class="hz-header">
      <h1 class="hz-title" data-text="Hazama">Hazama</h1>
      <p class="hz-subtitle">沈むほど戻りにくい。認識が合う者だけがΩへ潜る。</p>
      <div id="hz-sink-hud" class="hz-sink-hud" aria-label="沈下と観測者の計器">
        <div class="hz-sink-gauge" role="img" aria-label="沈下ゲージ"><span id="hz-sink-fill" class="hz-sink-fill"></span></div>
        <div class="hz-sink-read">
          <span id="hz-sink-depth" class="hz-sink-depth">深度 —</span>
          <span id="hz-observer" class="hz-observer" title="観測者（沈むほど私が増える）">私</span>
          <span id="hz-attune" class="hz-attune" title="認識：構造を読むほど合う／Ωの資格">認識 0</span>
          <span id="hz-gate" class="hz-gate" title="扉：Gate Runで開く／Ωのもう一つの資格">扉 0%</span>
        </div>
      </div>
    </header>

    <figure class="hz-visual" aria-label="深度に応じた探索者または曼荼羅ゲート">
      <img class="hz-visual-depth" src="assets/hazama-descent-key.webp" width="1500" height="900" alt="" fetchpriority="high" decoding="async" />
      <canvas id="hz-garden" class="hz-garden" aria-hidden="true"></canvas>
      <span class="hz-gate-orb" aria-hidden="true">
        <img src="assets/hazama-goal-mandala.webp" width="960" height="960" alt="" decoding="async" />
        <canvas id="hz-mandala" class="hz-mandala" aria-hidden="true"></canvas>
      </span>
    </figure>

    <section id="story" class="hz-story">
      深度データを読み込み中…
    </section>

    <section id="options" class="hz-options"></section>
  </main>

  <footer class="hz-footer">
    <div class="hz-footer-row">
      <small id="runtime-status">ローカル hazama-depths.json を読込中</small>
      <div class="hz-footer-actions">
        <small id="app-version">v</small>
        <button id="pwa-install" class="hz-reset hz-pwa-install" type="button" hidden>アプリ化</button>
        <button id="reset-progress" class="hz-reset" type="button">リセット</button>
      </div>
    </div>
  </footer>

  <script src="hazama-seed.js?v=2.40"></script>
  <script src="hazama-state.js?v=2.40"></script>
  <script src="hazama-gate-run.js?v=2.40"></script>
  <script src="hazama-main.js?v=2.40"></script>
</body>
</html>
